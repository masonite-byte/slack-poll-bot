name: Check Poll Ties

on:
  schedule:
    - cron: "5 22 * * 2" # Tue 5:05 PM CDT
    - cron: "5 23 * * 2" # Tue 5:05 PM CST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Verify CT local time
        run: |
          CURRENT_DAY=$(TZ=America/Chicago date +'%u')
          CURRENT_HOUR=$(TZ=America/Chicago date +'%H')
          echo "Chicago time — day: $CURRENT_DAY, hour: $CURRENT_HOUR"
          if [ "$CURRENT_DAY" != "2" ] || [ "$CURRENT_HOUR" != "17" ]; then
            echo "Not Tuesday 17:xx CT — skipping job"
            exit 0
          fi

      - run: go run ./cmd/checkties
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}