name: Post Results

on:
  schedule:
    - cron: "0 22 * * 3" # Wed 5:00 PM CT (CDT)
    - cron: "0 23 * * 3" # Wed 5:00 PM CT (CST)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Verify CT local time
        run: |
          if [ "$(TZ=America/Chicago date +'%u %H')" != "3 17" ]; then
            echo "Not Wednesday 17:00 CT — skipping job"
            exit 0
          fi

      - run: go run ./cmd/results
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
