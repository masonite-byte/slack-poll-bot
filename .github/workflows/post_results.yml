name: Post Results

on:
  schedule:
    - cron: "5 22 * * 3" # Wed 5:05 PM CT (CDT)
    - cron: "5 23 * * 3" # Wed 5:05 PM CT (CST)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Verify CT local time
        id: time-check
        if: github.event_name == 'schedule'
        run: |
          CURRENT_DAY=$(TZ=America/Chicago date +'%u')
          CURRENT_HOUR=$(TZ=America/Chicago date +'%H')
          echo "Chicago time — day: $CURRENT_DAY, hour: $CURRENT_HOUR"
          if [ "$CURRENT_DAY" = "3" ] && [ "$CURRENT_HOUR" = "17" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not Wednesday 17:xx CT — skipping"
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - run: go run ./cmd/results
        if: github.event_name == 'workflow_dispatch' || steps.time-check.outputs.run == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
