name: Schedule Polls

on:
  schedule:
    - cron: "5 * * * *"  # Every hour at :05 past — covers any poll scheduled on the hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run scheduled polls
        run: go run ./cmd/schedulepolls
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

      - name: Commit schedule state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add polls/_schedule_state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update schedule state [skip ci]"
          git pull --rebase
          git push
