name: Post Poll

on:
  schedule:
    - cron: "5 14 * * 1" # Mon 9:05 AM CT (CDT)
    - cron: "5 15 * * 1" # Mon 9:05 AM CT (CST)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Verify CT local time
        run: |
          CURRENT_DAY=$(TZ=America/Chicago date +'%u')
          CURRENT_HOUR=$(TZ=America/Chicago date +'%H')
          echo "Chicago time — day: $CURRENT_DAY, hour: $CURRENT_HOUR"
          if [ "$CURRENT_DAY" != "1" ] || [ "$CURRENT_HOUR" != "09" ]; then
            echo "Not Monday 09:xx CT — skipping job"
            exit 0
          fi

      - run: go run ./cmd/postpoll
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
