name: Post Poll

on:
  schedule:
    - cron: "0 14 * * 1" # Mon 9:00 AM CT (CDT)
    - cron: "0 15 * * 1" # Mon 9:00 AM CT (CST)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Verify CT local time
        run: |
          if [ "$(TZ=America/Chicago date +'%u %H')" != "1 09" ]; then
            echo "Not Monday 09:00 CT — skipping job"
            exit 0
          fi

      - run: go run ./cmd/postpoll
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
