name: Post Poll

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: 'Slack channel to post to (defaults to SLACK_CHANNEL_ID secret)'
        required: false
        default: ''
      poll_name:
        description: 'Poll slug to post (leave empty to use the stored weekly poll)'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - run: go run ./cmd/postpoll
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ inputs.channel_id || secrets.SLACK_CHANNEL_ID }}
          POLL_NAME: ${{ inputs.poll_name }}
